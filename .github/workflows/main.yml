name: Build Lukkit Paper-Fix
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'  # Changed from 'adopt' (adopt is deprecated)
    
    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    
    - name: Build with Maven
      run: |
        mvn clean package --batch-mode
        echo "=== Build completed ==="
    
    - name: Find built JAR
      run: |
        echo "Looking for built JAR files:"
        find . -name "*.jar" -type f | grep -v ".m2" | head -10
        echo "=== Target directory contents ==="
        ls -la target/
        echo "=== Checking JAR file ==="
        if [ -f target/Lukkit-*.jar ]; then
          JAR_FILE=$(ls target/Lukkit-*.jar)
          echo "Found JAR: $JAR_FILE"
          echo "JAR size: $(du -h $JAR_FILE | cut -f1)"
          echo "=== Basic JAR contents ==="
          jar -tf "$JAR_FILE" | head -10
        else
          echo "ERROR: No Lukkit JAR found in target/"
          ls -la target/
        fi
    
    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: Lukkit-PaperFix
        path: target/Lukkit-*.jar  # Changed from out/ to target/
        retention-days: 30
    
    - name: Create Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v2.1.2-paperfix
        name: "Lukkit 2.1.2 - Paper Compatibility Fix"
        body: |
          ## Lukkit Paper Compatibility Fix
          
          **Complete rewrite using container approach to bypass Paper's PluginLoader restrictions**
          
          ### What's Fixed:
          - ✅ **Paper 1.20+ compatibility** - Uses container approach instead of PluginLoader
          - ✅ **Maintains 1.8-1.21.8 Spigot compatibility** 
          - ✅ **Zero changes for server owners** - Same .lkt file placement
          - ✅ **All original Lua API preserved** - Existing plugins work unchanged
          
          ### How It Works:
          - Lukkit itself is a valid Paper plugin
          - Lua plugins are loaded internally by Lukkit container
          - Completely bypasses Paper's PluginLoader system
          - Better isolation and error handling
          
          ### Installation:
          1. Download this JAR
          2. Replace old Lukkit.jar in plugins folder
          3. Restart server - that's it!
          
          ### Credits:
          - Original: jammehcow, AL_1, mathhulk
          - Paper Fix: TheGamingMahi
          
          **Works on Paper 1.20+ where original Lukkit breaks!**
        files: target/Lukkit-*.jar  # Changed from out/ to target/
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
