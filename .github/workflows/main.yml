name: Build Lukkit Paper-Fix
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
    
    - name: Fix import statements
      run: |
        echo "Fixing LukkitPlugin to InternalLuaPlugin imports..."
        
        # Fix all LukkitPlugin imports to InternalLuaPlugin
        find src/main/java -name "*.java" -exec sed -i 's/import nz\.co\.jammehcow\.lukkit\.environment\.plugin\.LukkitPlugin;/import nz.co.jammehcow.lukkit.environment.plugin.InternalLuaPlugin;/g' {} +
        find src/main/java -name "*.java" -exec sed -i 's/LukkitPlugin plugin/InternalLuaPlugin plugin/g' {} +
        find src/main/java -name "*.java" -exec sed -i 's/private LukkitPlugin plugin/private InternalLuaPlugin plugin/g' {} +
        find src/main/java -name "*.java" -exec sed -i 's/public LukkitPlugin plugin/public InternalLuaPlugin plugin/g' {} +
        find src/main/java -name "*.java" -exec sed -i 's/protected LukkitPlugin plugin/protected InternalLuaPlugin plugin/g' {} +
        
        # Fix Main import in PluginWrapper
        sed -i 's/import nz\.co\.jammehcow\.lukkit\.Main;/import nz.co.jammehcow.lukkit.LukkitContainer;/g' src/main/java/nz/co/jammehcow/lukkit/environment/wrappers/PluginWrapper.java
        sed -i 's/Main\.instance/LukkitContainer.getInstance()/g' src/main/java/nz/co/jammehcow/lukkit/environment/wrappers/PluginWrapper.java
        
        # Fix PluginDescriptionFile imports if needed
        find src/main/java -name "*.java" -exec sed -i 's/import nz\.co\.jammehcow\.lukkit\.environment\.plugin\.PluginDescriptionFile;/import nz.co.jammehcow.lukkit.environment.plugin.PluginDescriptionFile;/g' {} +
        
        echo "Import fixes applied!"
        echo "=== Checking fixed files ==="
        grep -r "InternalLuaPlugin" src/main/java/nz/co/jammehcow/lukkit/environment/wrappers/PluginWrapper.java || echo "No InternalLuaPlugin found in PluginWrapper"
        grep -r "LukkitContainer" src/main/java/nz/co/jammehcow/lukkit/environment/wrappers/PluginWrapper.java || echo "No LukkitContainer found in PluginWrapper"
    
    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    
    - name: Build with Maven
      run: |
        mvn clean compile --batch-mode
        echo "=== Compilation successful, now packaging ==="
        mvn package --batch-mode
        echo "=== Build completed ==="
    
    - name: Find built JAR
      run: |
        echo "Looking for built JAR files:"
        find . -name "*.jar" -type f | grep -v ".m2" | head -10
        echo "=== Target directory contents ==="
        ls -la target/
        echo "=== Checking JAR file ==="
        if [ -f target/Lukkit-*.jar ]; then
          JAR_FILE=$(ls target/Lukkit-*.jar)
          echo "Found JAR: $JAR_FILE"
          echo "JAR size: $(du -h $JAR_FILE | cut -f1)"
          echo "=== Basic JAR contents ==="
          jar -tf "$JAR_FILE" | head -10
        else
          echo "ERROR: No Lukkit JAR found in target/"
          ls -la target/
          exit 1
        fi
    
    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: Lukkit-PaperFix
        path: target/Lukkit-*.jar
        retention-days: 30
    
    - name: Create Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v2.1.2-paperfix
        name: "Lukkit 2.1.2 - Paper Compatibility Fix"
        body: |
          ## Lukkit Paper Compatibility Fix
          
          **Complete rewrite using container approach to bypass Paper's PluginLoader restrictions**
          
          ### Compatibility:
          - ✅ **Spigot 1.8-1.21.8** - Full support
          - ❌ **Paper 1.20+** - Fixed! (Original breaks due to PluginLoader changes)
          - ⚠️ **Paper 1.19.x** - May work on older builds
          
          ### What's New:
          - **Container architecture** - Lukkit loads Lua plugins internally
          - **Bypasses Paper's PluginLoader** - No more reflection hacks
          - **Future-proof** - Works on any Paper version that supports Java plugins
          - **Better isolation** - One Lua plugin crashing doesn't affect others
          
          ### Installation:
          1. Download this JAR
          2. Replace old Lukkit.jar in plugins folder
          3. Keep .lkt files in plugins/ folder (no changes needed)
          4. Restart server
          
          ### Credits:
          - Original: jammehcow, AL_1, mathhulk
          - Paper Fix: TheGamingMahi
          
          **Finally: Lukkit that works on modern Paper versions!**
        files: target/Lukkit-*.jar
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
