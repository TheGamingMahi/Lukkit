name: Build Lukkit Paper-Fix
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
    
    - name: Check critical files exist
      run: |
        echo "=== Checking if critical files exist ==="
        ls -la src/main/java/nz/co/jammehcow/lukkit/environment/plugin/ || echo "Plugin directory missing!"
        [ -f "src/main/java/nz/co/jammehcow/lukkit/environment/plugin/PluginDescriptionFile.java" ] && echo "✅ PluginDescriptionFile exists" || echo "❌ PluginDescriptionFile MISSING - THIS IS BAD"
        [ -f "src/main/java/nz/co/jammehcow/lukkit/environment/plugin/InternalLuaPlugin.java" ] && echo "✅ InternalLuaPlugin exists" || echo "❌ InternalLuaPlugin MISSING"
        [ -f "src/main/java/nz/co/jammehcow/lukkit/LukkitContainer.java" ] && echo "✅ LukkitContainer exists" || echo "❌ LukkitContainer MISSING"
        
        echo "=== Checking for problematic files ==="
        [ -f "src/main/java/nz/co/jammehcow/lukkit/Main.java" ] && echo "❌ Main.java should be deleted" || echo "✅ Main.java correctly deleted"
        [ -f "src/main/java/nz/co/jammehcow/lukkit/environment/plugin/LukkitPlugin.java" ] && echo "❌ LukkitPlugin.java should be deleted" || echo "✅ LukkitPlugin.java correctly deleted"
    
    - name: Fix imports (safely)
      run: |
        echo "=== Safely fixing imports ==="
        
        # ONLY fix import statements, not variable declarations
        find src/main/java -name "*.java" -exec sed -i 's/import nz\.co\.jammehcow\.lukkit\.environment\.plugin\.LukkitPlugin;/import nz.co.jammehcow.lukkit.environment.plugin.InternalLuaPlugin;/g' {} +
        
        # Fix Main import in PluginWrapper specifically
        if [ -f "src/main/java/nz/co/jammehcow/lukkit/environment/wrappers/PluginWrapper.java" ]; then
          sed -i 's/import nz\.co\.jammehcow\.lukkit\.Main;/import nz.co.jammehcow.lukkit.LukkitContainer;/g' src/main/java/nz/co/jammehcow/lukkit/environment/wrappers/PluginWrapper.java
          sed -i 's/Main\.instance/LukkitContainer.getInstance()/g' src/main/java/nz/co/jammehcow/lukkit/environment/wrappers/PluginWrapper.java
        fi
        
        echo "=== Verifying fixes ==="
        grep -n "InternalLuaPlugin" src/main/java/nz/co/jammehcow/lukkit/environment/LuaEnvironment.java || echo "No InternalLuaPlugin in LuaEnvironment"
        grep -n "LukkitContainer" src/main/java/nz/co/jammehcow/lukkit/environment/wrappers/PluginWrapper.java || echo "No LukkitContainer in PluginWrapper"
    
    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    
    - name: Build with Maven
      run: |
        echo "=== Attempting build ==="
        mvn clean compile --batch-mode
        
        if [ $? -eq 0 ]; then
          echo "✅ Compilation successful!"
          mvn package --batch-mode
        else
          echo "❌ Compilation failed"
          echo "=== First few errors ==="
          mvn clean compile --batch-mode 2>&1 | grep -A 5 -B 2 "cannot find symbol" | head -20
          exit 1
        fi
    
    - name: Upload JAR artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Lukkit-PaperFix
        path: target/Lukkit-*.jar
        retention-days: 30
